# MAVERIC Command Schema — Public Example
#
# This file documents the schema structure. It is safe to track in version
# control. The operational commands.yml (gitignored) contains the real
# command IDs, argument details, and routing for the MAVERIC mission.
#
# To use: cp commands.example.yml commands.yml, then populate with real commands.
#
# Schema structure per command:
#
#   <cmd_id>:               # Lowercase unique command identifier
#     dest: <int>           # Default destination node ID (integer)
#     echo: <int>           # Default echo node ID (0 = NONE)
#     ptype: <int>          # Default packet type ID
#     guard: <bool>         # Require operator confirmation before send
#     rx_only: <bool>       # Command is receive-only; cannot be uplinked
#     variadic: <bool>      # Accepts variable number of trailing arguments
#     nodes: [<str>, ...]   # Node names this command is valid for (empty = all)
#     tx_args:              # Arguments for uplink
#       - name: <str>       # Argument name (operator-facing label)
#         type: <str>       # One of: str, int, float, epoch_ms, bool, blob
#         important: <bool> # Show prominently in packet list row
#     rx_args:              # Arguments expected in the downlink response
#       - name: <str>
#         type: <str>
#
# Argument types:
#   str       — raw string token
#   int       — signed integer
#   float     — floating-point number
#   epoch_ms  — Unix timestamp in milliseconds (decoded to UTC)
#   bool      — 0/1 boolean
#   blob      — binary blob, displayed as hex
#
# Node names (MAVERIC-specific):
#   GS    — Ground station (origin)
#   LPPM  — Low-Power Power Module
#   EPS   — Electrical Power System
#   UPPM  — Uplink/Payload Power Module
#   NONE  — No echo routing
#

commands:

  # ── Basic connectivity ──────────────────────────────────────────────────

  com_ping:
    dest: 1          # LPPM node ID
    echo: 0          # NONE
    ptype: 1         # CMD
    guard: false
    nodes: [LPPM, EPS, UPPM]
    tx_args: []
    rx_args:
      - name: uptime_ms
        type: int
        important: true

  # ── Mode control ────────────────────────────────────────────────────────

  set_mode:
    dest: 1          # LPPM
    echo: 0          # NONE
    ptype: 1         # CMD
    guard: true      # Require confirmation — mode change is hazardous
    nodes: [LPPM]
    tx_args:
      - name: mode
        type: int
        important: true
    rx_args:
      - name: prev_mode
        type: int
      - name: new_mode
        type: int
        important: true

  # ── Telemetry ───────────────────────────────────────────────────────────

  tlm_beacon:
    rx_only: true    # Cannot be uplinked; documents the downlink format
    rx_args:
      - name: voltage_mv
        type: int
        important: true
      - name: current_ma
        type: int
      - name: temp_c
        type: float
      - name: timestamp_ms
        type: epoch_ms
        important: true

  # ── File transfer ───────────────────────────────────────────────────────

  file_download:
    dest: 2          # EPS node ID
    echo: 0          # NONE
    ptype: 4         # FILE
    guard: true      # Requires confirmation — initiates downlink session
    nodes: [EPS, UPPM]
    tx_args:
      - name: file_id
        type: int
        important: true
      - name: offset
        type: int
    rx_args:
      - name: file_id
        type: int
      - name: chunk_index
        type: int
      - name: total_chunks
        type: int
      - name: data
        type: blob
