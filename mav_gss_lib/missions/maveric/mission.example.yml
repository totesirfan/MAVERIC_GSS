# MAVERIC mission database (PUBLIC-SAFE TEMPLATE).
#
# This file is the committed reference. The real, gitignored copy
# lives at mav_gss_lib/missions/maveric/mission.yml and contains the
# full command catalog and bitfield definitions.
#
# Author: Irfan Annuar - USC ISI SERC

schema_version: 1

id: maveric
name: "MAVERIC CubeSat"

header:
  version: "0.1.0"
  date: "2026-04-25"
  description: "MAVERIC declarative mission database (template)"

extensions:
  nodes:
    NONE: 0
    LPPM: 1
    EPS: 2
    UPPM: 3
    HLNV: 4
    ASTR: 5
    GS: 6
    FTDI: 7
  ptypes:
    CMD: 1
    RES: 2
    ACK: 3
    TLM: 4
    FILE: 5
  node_descriptions:
    LPPM: "Low-power power manager"
    EPS: "Electrical power system"
    UPPM: "Upper-power power manager"
    HLNV: "Helio-low NavCam node"
    ASTR: "AstroCam node"
    GS: "Ground station"
    FTDI: "Bench FTDI test endpoint"
  gs_node: GS

parameter_types:
  V_milli_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.001]
    unit: "V"
    description: "Voltage in millivolts (LE int16); engineering = mV * 1e-3"

  I_milli_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.001]
    unit: "A"
    description: "Current in milliamps (LE int16)"

  P_milli_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.001]
    unit: "W"
    description: "Power in milliwatts (LE int16)"

  TS_ADC_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.0976563]
    unit: "%"
    description: "EPS thermistor ADC reading (×0.0976563 %)"

  T_DIE_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.5]
    unit: "°C"
    description: "EPS die temperature (×0.5 °C)"

  T_RAW_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    unit: "°C"
    description: "Pre-scaled ADCS temperature reading (signed int16)"

  rate_rad_s:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "rad/s"
    description: "Angular rate component"

  mag_nT:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "nT"
    description: "Magnetometer field component"

  mtq_dipole_Am2:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "A.m^2"
    description: "Magnetorquer dipole moment"

  temp_C_f32:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "°C"
    description: "Generic float temperature"

  battery_voltage_f32:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "V"
    description: "Battery voltage as float (PWR_VOL_5V/3V scalar)"

  generic_f32:
    kind: float
    size_bits: 32
    byte_order: little
    description: "Untyped 32-bit float"

  vec3_rate:
    kind: array
    array_type_ref: rate_rad_s
    dimension_list: [3]
    unit: "rad/s"
    description: "Body-frame angular rate vector"

  vec3_mag:
    kind: array
    array_type_ref: mag_nT
    dimension_list: [3]
    unit: "nT"
    description: "Body-frame magnetic field vector"

  vec3_mtq:
    kind: array
    array_type_ref: mtq_dipole_Am2
    dimension_list: [3]
    unit: "A.m^2"
    description: "Magnetorquer dipole vector"

  vec3_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [3]
    description: "Generic 3-float vector"

  vec4_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [4]
    description: "Generic 4-float vector (e.g., quaternion)"

  mat3x3_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [9]
    description: "Row-major 3x3 float matrix"

  vec2_i16:
    kind: array
    array_type_ref: i16
    dimension_list: [2]
    description: "Two LE int16 values"

  bytes4_u8:
    kind: array
    array_type_ref: u8
    dimension_list: [4]
    description: "Four raw bytes (used for bitfield-type inputs)"

  bytes2_u8:
    kind: array
    array_type_ref: u8
    dimension_list: [2]
    description: "Two raw bytes"

  vec2_u16:
    kind: array
    array_type_ref: u16
    dimension_list: [2]
    description: "Two LE uint16 values"

  vec5_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [5]
    description: "Generic 5-float vector"

  vec7_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [7]
    description: "Generic 7-float vector"

  Quaternion:
    kind: aggregate
    member_list:
      - name: q0
        type: f32_le
      - name: q1
        type: f32_le
      - name: q2
        type: f32_le
      - name: q3
        type: f32_le
    unit: "quaternion"
    description: "Attitude quaternion (scalar-last by convention)"

  GncPlannerMode:
    kind: enum
    size_bits: 8
    values:
      0: "Safe"
      1: "Auto"
      2: "Manual"

  NvgStatus:
    kind: enum
    size_bits: 8
    values:
      0: "off"
      1: "on"
      2: "error"

  NvgSensorId:
    kind: enum
    size_bits: 8
    values:
      1: "ACCELEROMETER"
      2: "MAGNETOMETER"
      3: "ORIENTATION"
      4: "GYROSCOPE"
      6: "PRESSURE"
      7: "TEMPERATURE"
      9: "GRAVITY"
      10: "LINEAR_ACCEL"
      11: "ROTATION_VECTOR"
      14: "MAG_UNCAL"
      15: "GAME_ROTATION"
      16: "GYRO_UNCAL"
      17: "SIGNIFICANT_MOTION"
      20: "GEOMAG_ROTATION"
      254: "META_EVENT"

  OpsStage:
    kind: enum
    size_bits: 8
    values:
      0: "Pre-Launch"
      1: "Detumble"
      2: "Sun-Point"
      3: "Nominal"
      4: "Safe"

  GncBootMode:
    kind: enum
    size_bits: 8
    values:
      0: "Safe"
      1: "De-tumbling"
      2: "Sun Spin"
      3: "Sun-Pointing"
      4: "Fine Pointing"
      5: "LVLH"
      6: "Target Tracking"
      7: "Manual"
    description: "Full table copied from gnc_schema.MODE_NAMES"

  BeaconCallsign:
    kind: string
    encoding: fixed
    fixed_size_bytes: 7
    description: "7-byte ASCII callsign at the head of the beacon"

  Filename:
    kind: string
    encoding: null_terminated
    description: "Camera/imaging filename (null-terminated when persisted)"

  Tle:
    kind: string
    encoding: to_end
    description: "Two-line element string (last entry, ascii_tokens)"

  LogText:
    kind: string
    encoding: to_end
    description: "Free-form FTDI log payload (rest-of-cursor)"

  LcdArgs:
    kind: string
    encoding: to_end
    description: "Trailing args to LCD display command"

  ChunkData:
    kind: binary
    size:
      dynamic_ref: chunk_len
    description: "Image chunk payload (length resolved from chunk_len)"

  BeaconTime:
    kind: absolute_time
    encoding: millis_u64
    epoch: unix
    byte_order: little
    description: "Spacecraft Unix-epoch ms timestamp (LE u64)"

  BcdTime:
    kind: int
    size_bits: 32
    signed: false
    byte_order: little
    calibrator:
      python: "maveric.bcd_time"
    description: "uint32 LE BCD time -> {hour, minute, second, display}"

  BcdDate:
    kind: int
    size_bits: 32
    signed: false
    byte_order: little
    calibrator:
      python: "maveric.bcd_date"
    description: "uint32 LE BCD date -> {year, month, day, weekday, display}"

  AdcsTmp:
    kind: int
    size_bits: 32
    signed: false
    byte_order: little
    calibrator:
      python: "maveric.adcs_tmp"
    description: "uint32 LE encoding int16[2]; produces ADCS temperature dict"

  FssTmp:
    kind: int
    size_bits: 32
    signed: false
    byte_order: little
    calibrator:
      python: "maveric.fss_tmp"
    description: "uint32 LE encoding int16[2]; produces dual-FSS temperature dict"

  GncPlannerModeDict:
    kind: int
    size_bits: 8
    signed: false
    calibrator:
      python: "maveric.gnc_planner_mode"
    description: "u8 -> {mode, mode_name}; matches legacy gnc_get_mode response shape"

  nvg_vec4_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [4]
    description: "4-float NVG sensor reading (X, Y, Z, Accuracy)"

  nvg_vec5_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [5]
    description: "5-float NVG quaternion + accuracy"

  nvg_vec7_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [7]
    description: "7-float NVG uncalibrated reading (raw + bias)"

  nvg_vec3_f32_meta:
    kind: array
    array_type_ref: f32_le
    dimension_list: [3]
    description: "3-float NVG meta-event payload"

parameters: {}

bitfield_types:
  STAT_REG:
    size_bits: 32
    byte_order: little
    entry_list:
      - { name: MODE,            bits: [0, 6],   kind: enum, enum_ref: GncBootMode }
      - { name: MODE_FLAG7,      bits: [7, 7],   kind: bool }
      - { name: EKF,             bits: [8, 8],   kind: bool }
      - { name: CUSSV,           bits: [9, 9],   kind: bool }
      - { name: AME,             bits: [10, 10], kind: bool }
      - { name: TUMB,            bits: [11, 11], kind: bool }
      - { name: TGL,             bits: [12, 12], kind: bool }
      - { name: SUN,             bits: [13, 13], kind: bool }
      - { name: DES,             bits: [14, 14], kind: bool }
      - { name: TLE,             bits: [15, 15], kind: bool }
      - { name: byte2_raw,       bits: [16, 23], kind: uint }
      - { name: GNSS_UP_TO_DATE, bits: [24, 24], kind: bool }
      - { name: GNSS_OC,         bits: [25, 25], kind: bool }
      - { name: OT,              bits: [26, 26], kind: bool }
      - { name: OC,              bits: [27, 27], kind: bool }
      - { name: UV,              bits: [28, 28], kind: bool }
      - { name: WDT,             bits: [29, 29], kind: bool }
      - { name: SERR,            bits: [30, 30], kind: bool }
      - { name: HERR,            bits: [31, 31], kind: bool }

  ACT_ERR_REG:
    size_bits: 32
    byte_order: little
    entry_list:
      - { name: CMG0, bits: [0, 0], kind: bool }
      - { name: CMG1, bits: [1, 1], kind: bool }
      - { name: CMG2, bits: [2, 2], kind: bool }
      - { name: CMG3, bits: [3, 3], kind: bool }
      - { name: byte0_spare, bits: [4, 7], kind: uint }
      - { name: MTQ0, bits: [8, 8],   kind: bool }
      - { name: MTQ1, bits: [9, 9],   kind: bool }
      - { name: MTQ2, bits: [10, 10], kind: bool }
      - { name: byte1_spare, bits: [11, 15], kind: uint }
      - { name: byte2_raw,   bits: [16, 23], kind: uint }
      - { name: byte3_raw,   bits: [24, 31], kind: uint }

  SEN_ERR_REG:
    size_bits: 32
    byte_order: little
    entry_list:
      - { name: FSS0, bits: [0, 0], kind: bool }
      - { name: FSS1, bits: [1, 1], kind: bool }
      - { name: FSS2, bits: [2, 2], kind: bool }
      - { name: FSS3, bits: [3, 3], kind: bool }
      - { name: FSS4, bits: [4, 4], kind: bool }
      - { name: FSS5, bits: [5, 5], kind: bool }
      - { name: byte0_spare, bits: [6, 7], kind: uint }
      - { name: MAG0, bits: [8, 8],   kind: bool }
      - { name: MAG1, bits: [9, 9],   kind: bool }
      - { name: MAG2, bits: [10, 10], kind: bool }
      - { name: MAG3, bits: [11, 11], kind: bool }
      - { name: MAG4, bits: [12, 12], kind: bool }
      - { name: MAG5, bits: [13, 13], kind: bool }
      - { name: byte1_spare, bits: [14, 15], kind: uint }
      - { name: IMU0, bits: [16, 16], kind: bool }
      - { name: IMU1, bits: [17, 17], kind: bool }
      - { name: IMU2, bits: [18, 18], kind: bool }
      - { name: IMU3, bits: [19, 19], kind: bool }
      - { name: byte2_spare, bits: [20, 23], kind: uint }
      - { name: STR0, bits: [24, 24], kind: bool }
      - { name: STR1, bits: [25, 25], kind: bool }
      - { name: byte3_spare, bits: [26, 31], kind: uint }

  CONF_REG:
    size_bits: 32
    byte_order: little
    entry_list:
      - { name: MODE,        bits: [0, 6],   kind: enum, enum_ref: GncBootMode }
      - { name: CMD,         bits: [7, 7],   kind: bool }
      - { name: byte1_raw,   bits: [8, 15],  kind: uint }
      - { name: byte2_raw,   bits: [16, 23], kind: uint }
      - { name: TARGET_ELEV, bits: [24, 31], kind: uint, unit: "deg" }

sequence_containers:
  eps_hk:
    domain: eps
    layout: binary
    restriction_criteria:
      packet:
        cmd_id: eps_hk
        ptype: TLM
    entry_list:
      - { name: I_BUS,  type: I_milli_i16 }
      - { name: I_BAT,  type: I_milli_i16 }
      - { name: V_BUS,  type: V_milli_i16 }
      - { name: V_AC1,  type: V_milli_i16 }
      - { name: V_AC2,  type: V_milli_i16 }
      - { name: V_BAT,  type: V_milli_i16 }
      - { name: V_SYS,  type: V_milli_i16 }
      - { name: TS_ADC, type: TS_ADC_i16 }
      - { name: T_DIE,  type: T_DIE_i16 }
      - { name: V3V3,   type: V_milli_i16 }
      - { name: I3V3,   type: I_milli_i16 }
      - { name: P3V3,   type: P_milli_i16 }
      - { name: V5V0,   type: V_milli_i16 }
      - { name: I5V0,   type: I_milli_i16 }
      - { name: P5V0,   type: P_milli_i16 }
      - { name: VOUT1,  type: V_milli_i16 }
      - { name: IOUT1,  type: I_milli_i16 }
      - { name: POUT1,  type: P_milli_i16 }
      - { name: VOUT2,  type: V_milli_i16 }
      - { name: IOUT2,  type: I_milli_i16 }
      - { name: POUT2,  type: P_milli_i16 }
      - { name: VOUT3,  type: V_milli_i16 }
      - { name: IOUT3,  type: I_milli_i16 }
      - { name: POUT3,  type: P_milli_i16 }
      - { name: VOUT4,  type: V_milli_i16 }
      - { name: IOUT4,  type: I_milli_i16 }
      - { name: POUT4,  type: P_milli_i16 }
      - { name: VOUT5,  type: V_milli_i16 }
      - { name: IOUT5,  type: I_milli_i16 }
      - { name: POUT5,  type: P_milli_i16 }
      - { name: VOUT6,  type: V_milli_i16 }
      - { name: IOUT6,  type: I_milli_i16 }
      - { name: POUT6,  type: P_milli_i16 }
      - { name: VBRN1,  type: V_milli_i16 }
      - { name: IBRN1,  type: I_milli_i16 }
      - { name: PBRN1,  type: P_milli_i16 }
      - { name: VBRN2,  type: V_milli_i16 }
      - { name: IBRN2,  type: I_milli_i16 }
      - { name: PBRN2,  type: P_milli_i16 }
      - { name: VSIN1,  type: V_milli_i16 }
      - { name: ISIN1,  type: I_milli_i16 }
      - { name: PSIN1,  type: P_milli_i16 }
      - { name: VSIN2,  type: V_milli_i16 }
      - { name: ISIN2,  type: I_milli_i16 }
      - { name: PSIN2,  type: P_milli_i16 }
      - { name: VSIN3,  type: V_milli_i16 }
      - { name: ISIN3,  type: I_milli_i16 }
      - { name: PSIN3,  type: P_milli_i16 }

  tlm_beacon:
    domain: spacecraft
    layout: binary
    restriction_criteria:
      packet:
        cmd_id: tlm_beacon
        ptype: TLM
    entry_list:
      - { name: callsign,        type: BeaconCallsign }
      - { name: time,            type: BeaconTime }
      - { name: ops_stage,       type: OpsStage }
      - { name: lppm_rbt_cnt,    type: u16 }
      - { name: lppm_rbt_cause,  type: u8 }
      - { name: uppm_rbt_cnt,    type: u16 }
      - { name: uppm_rbt_cause,  type: u8 }
      - { name: ertc_heartbeat,  type: u8 }
      - { name: mtq_heartbeat,   type: u8 }
      - { name: nvg_heartbeat,   type: u8 }
      - { name: eps_heartbeat,   type: u8 }
      - { name: hn_state,        type: u8 }
      - { name: ab_state,        type: u8 }
      - { name: mtq_stat,        type: STAT_REG }
      - { name: gyro_rate_src,   type: u8 }
      - { name: mag_src,         type: u8 }
      - { name: gyro_rate,       type: vec3_rate }
      - { name: mag,             type: vec3_mag }
      - { name: mtq_dipole,      type: vec3_mtq }
      - { name: adcs_tmp_C,      type: f32_le }
      - { name: eps_i_bus,       type: u16 }
      - { name: eps_i_bat,       type: u16 }
      - { name: eps_v_bus,       type: u16 }
      - { name: eps_v_bat,       type: u16 }
      - { name: eps_v_sys,       type: u16 }
      - { name: eps_ts_adc,      type: u16 }
      - { name: eps_t_die,       type: u16 }
      - { name: eps_mode,        type: u16 }
      - { name: gnc_mode,        type: GncPlannerModeDict }
      - { name: unexpected_safe,     type: u16 }
      - { name: unexpected_detumble, type: u16 }
      - { name: sunspin,         type: u16 }

  gnc_get_mode_res:
    domain: gnc
    layout: ascii_tokens
    restriction_criteria:
      packet:
        cmd_id: gnc_get_mode
        ptype: RES
    entry_list:
      - { name: gnc_mode, type: GncPlannerModeDict }

  gnc_get_cnts_res:
    domain: gnc
    layout: ascii_tokens
    restriction_criteria:
      packet:
        cmd_id: gnc_get_cnts
        ptype: RES
    entry_list:
      - { name: unexpected_safe,     type: u32 }
      - { name: unexpected_detumble, type: u32 }
      - { name: sunspin,             type: u32 }

  # ── Task 33: mtq_get_1_res abstract parent + paged-frame consumers ──

  mtq_get_1_res:
    domain: gnc
    layout: ascii_tokens
    abstract: true
    restriction_criteria:
      packet:
        cmd_id: mtq_get_1
        ptype: RES
    entry_list:
      - { name: status,   type: u8, emit: false }
      - { name: module,   type: u8, emit: false }
      - { name: register, type: u8, emit: false }

  mtq_get_active_res:
    domain: gnc
    layout: ascii_tokens
    restriction_criteria:
      packet:
        cmd_id: mtq_get_active
        ptype: RES
    entry_list:
      - { name: status, type: u8 }
      - { name: page,   type: u8 }
      - paged_frame_entry:
          marker_separator: ","
          dispatch_keys: [module, register]
          base_container_ref: mtq_get_1_res
          on_unknown_register: skip

  mtq_get_hk_res:
    domain: gnc
    layout: ascii_tokens
    restriction_criteria:
      packet:
        cmd_id: mtq_get_hk
        ptype: RES
    entry_list:
      - { name: status, type: u8 }
      - { name: page,   type: u8 }
      - paged_frame_entry:
          marker_separator: ","
          dispatch_keys: [module, register]
          base_container_ref: mtq_get_1_res
          on_unknown_register: skip

  mtq_get_param_res:
    domain: gnc
    layout: ascii_tokens
    restriction_criteria:
      packet:
        cmd_id: mtq_get_param
        ptype: RES
    entry_list:
      - { name: status, type: u8 }
      - { name: page,   type: u8 }
      - paged_frame_entry:
          marker_separator: ","
          dispatch_keys: [module, register]
          base_container_ref: mtq_get_1_res
          on_unknown_register: skip

  # ── Task 34: GNC Module 0 (User) register containers ──
  # Source: gnc_schema.py REGISTERS where module == 0
  # Authoritative register numbers from source (plan table had errors).

  reg_M0_CONF:
    domain: gnc
    base_container_ref: mtq_get_1_res
    restriction_criteria:
      parent_args: { module: 0, register: 4 }
    entry_list:
      - { name: CONF, type: CONF_REG }

  reg_M0_TIME:
    domain: gnc
    base_container_ref: mtq_get_1_res
    restriction_criteria:
      parent_args: { module: 0, register: 5 }
    entry_list:
      - { name: TIME, type: BcdTime }

  reg_M0_DATE:
    domain: gnc
    base_container_ref: mtq_get_1_res
    restriction_criteria:
      parent_args: { module: 0, register: 6 }
    entry_list:
      - { name: DATE, type: BcdDate }

  reg_M0_POINTING_AXIS:
    domain: gnc
    base_container_ref: mtq_get_1_res
    restriction_criteria:
      parent_args: { module: 0, register: 14 }
    entry_list:
      - { name: POINTING_AXIS, type: vec3_f32 }

  reg_M0_TLE:
    domain: gnc
    base_container_ref: mtq_get_1_res
    restriction_criteria:
      parent_args: { module: 0, register: 17 }
    entry_list:
      - { name: TLE, type: Tle }

  reg_M0_MTQ_USER:
    domain: gnc
    base_container_ref: mtq_get_1_res
    restriction_criteria:
      parent_args: { module: 0, register: 103 }
    entry_list:
      - { name: MTQ_USER, type: vec3_f32 }

  reg_M0_STAT:
    domain: gnc
    base_container_ref: mtq_get_1_res
    restriction_criteria:
      parent_args: { module: 0, register: 128 }
