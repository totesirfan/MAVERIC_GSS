# MAVERIC mission database (PUBLIC-SAFE TEMPLATE).
#
# This file is the committed reference. The real, gitignored copy
# lives at mav_gss_lib/missions/maveric/mission.yml and contains the
# full command catalog and bitfield definitions.
#
# Author: Irfan Annuar - USC ISI SERC

schema_version: 1

id: maveric
name: "MAVERIC CubeSat"

header:
  version: "0.1.0"
  date: "2026-04-25"
  description: "MAVERIC declarative mission database (template)"

extensions:
  nodes:
    NONE: 0
    LPPM: 1
    EPS: 2
    UPPM: 3
    HLNV: 4
    ASTR: 5
    GS: 6
    FTDI: 7
  ptypes:
    CMD: 1
    RES: 2
    ACK: 3
    TLM: 4
    FILE: 5
  node_descriptions:
    LPPM: "Low-power power manager"
    EPS: "Electrical power system"
    UPPM: "Upper-power power manager"
    HLNV: "Helio-low NavCam node"
    ASTR: "AstroCam node"
    GS: "Ground station"
    FTDI: "Bench FTDI test endpoint"
  gs_node: GS

parameter_types:
  V_milli_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.001]
    unit: "V"
    description: "Voltage in millivolts (LE int16); engineering = mV * 1e-3"

  I_milli_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.001]
    unit: "A"
    description: "Current in milliamps (LE int16)"

  P_milli_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.001]
    unit: "W"
    description: "Power in milliwatts (LE int16)"

  TS_ADC_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.0976563]
    unit: "%"
    description: "EPS thermistor ADC reading (×0.0976563 %)"

  T_DIE_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.5]
    unit: "°C"
    description: "EPS die temperature (×0.5 °C)"

  T_RAW_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    unit: "°C"
    description: "Pre-scaled ADCS temperature reading (signed int16)"

  rate_rad_s:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "rad/s"
    description: "Angular rate component"

  mag_nT:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "nT"
    description: "Magnetometer field component"

  mtq_dipole_Am2:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "A.m^2"
    description: "Magnetorquer dipole moment"

  temp_C_f32:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "°C"
    description: "Generic float temperature"

  battery_voltage_f32:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "V"
    description: "Battery voltage as float (PWR_VOL_5V/3V scalar)"

  generic_f32:
    kind: float
    size_bits: 32
    byte_order: little
    description: "Untyped 32-bit float"

  vec3_rate:
    kind: array
    array_type_ref: rate_rad_s
    dimension_list: [3]
    unit: "rad/s"
    description: "Body-frame angular rate vector"

  vec3_mag:
    kind: array
    array_type_ref: mag_nT
    dimension_list: [3]
    unit: "nT"
    description: "Body-frame magnetic field vector"

  vec3_mtq:
    kind: array
    array_type_ref: mtq_dipole_Am2
    dimension_list: [3]
    unit: "A.m^2"
    description: "Magnetorquer dipole vector"

  vec3_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [3]
    description: "Generic 3-float vector"

  vec4_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [4]
    description: "Generic 4-float vector (e.g., quaternion)"

  mat3x3_f32:
    kind: array
    array_type_ref: f32_le
    dimension_list: [9]
    description: "Row-major 3x3 float matrix"

  vec2_i16:
    kind: array
    array_type_ref: i16
    dimension_list: [2]
    description: "Two LE int16 values"

  bytes4_u8:
    kind: array
    array_type_ref: u8
    dimension_list: [4]
    description: "Four raw bytes (used for bitfield-type inputs)"

  bytes2_u8:
    kind: array
    array_type_ref: u8
    dimension_list: [2]
    description: "Two raw bytes"

  Quaternion:
    kind: aggregate
    member_list:
      - name: q0
        type: f32_le
      - name: q1
        type: f32_le
      - name: q2
        type: f32_le
      - name: q3
        type: f32_le
    unit: "quaternion"
    description: "Attitude quaternion (scalar-last by convention)"

  GncPlannerMode:
    kind: enum
    size_bits: 8
    values:
      0: "Safe"
      1: "Auto"
      2: "Manual"

  NvgStatus:
    kind: enum
    size_bits: 8
    values:
      0: "off"
      1: "on"
      2: "error"

  NvgSensorId:
    kind: enum
    size_bits: 8
    values:
      1: "ACCELEROMETER"
      2: "MAGNETOMETER"
      3: "ORIENTATION"
      4: "GYROSCOPE"
      6: "PRESSURE"
      7: "TEMPERATURE"
      9: "GRAVITY"
      10: "LINEAR_ACCEL"
      11: "ROTATION_VECTOR"
      14: "MAG_UNCAL"
      15: "GAME_ROTATION"
      16: "GYRO_UNCAL"
      17: "SIGNIFICANT_MOTION"
      20: "GEOMAG_ROTATION"
      254: "META_EVENT"

  OpsStage:
    kind: enum
    size_bits: 8
    values:
      0: "Pre-Launch"
      1: "Detumble"
      2: "Sun-Point"
      3: "Nominal"
      4: "Safe"

  GncBootMode:
    kind: enum
    size_bits: 8
    values:
      0: "Safe"
      1: "De-tumbling"
      2: "Sun Spin"
      3: "Sun-Pointing"
      4: "Fine Pointing"
      5: "LVLH"
      6: "Target Tracking"
      7: "Manual"
    description: "Full table copied from gnc_schema.MODE_NAMES"

  BeaconCallsign:
    kind: string
    encoding: fixed
    fixed_size_bytes: 7
    description: "7-byte ASCII callsign at the head of the beacon"

  Filename:
    kind: string
    encoding: null_terminated
    description: "Camera/imaging filename (null-terminated when persisted)"

  Tle:
    kind: string
    encoding: to_end
    description: "Two-line element string (last entry, ascii_tokens)"

  LogText:
    kind: string
    encoding: to_end
    description: "Free-form FTDI log payload (rest-of-cursor)"

  LcdArgs:
    kind: string
    encoding: to_end
    description: "Trailing args to LCD display command"

  ChunkData:
    kind: binary
    size:
      dynamic_ref: chunk_len
    description: "Image chunk payload (length resolved from chunk_len)"

  BeaconTime:
    kind: absolute_time
    encoding: millis_u64
    epoch: unix
    byte_order: little
    description: "Spacecraft Unix-epoch ms timestamp (LE u64)"

parameters: {}

bitfield_types: {}

sequence_containers: {}

meta_commands: {}
