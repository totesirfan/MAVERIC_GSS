# MAVERIC CubeSat Mission Metadata (Public Example)
# Tracked template showing the expected structure of mission.yml.
# Copy this file to `mission.yml` beside it and fill in operational values.
# `mission.yml` is gitignored and is the file actually loaded at runtime.
#
# Placeholder values below (CALLSIGN, 0 ports/SSIDs, XXX.XX MHz) MUST be
# replaced with real mission values before flight. The example is intentionally
# non-operational so it cannot be run as-is.

mission_name: MAVERIC

nodes:
  0: NONE
  1: LPPM
  2: EPS
  3: UPPM
  4: HLNV
  5: ASTR
  6: GS
  7: FTDI

ptypes:
  1: CMD
  2: RES
  3: ACK
  4: NACK
  5: TLM
  6: FILE

node_descriptions:
  LPPM: Lower Pluggable Processor Module
  UPPM: Upper Pluggable Processor Module
  EPS: Electrical Power System
  GS: Ground Station
  HLNV: Holonav Payload
  ASTR: ASTR Payload
  FTDI: FTDI Debug Interface

gs_node: GS

ax25:
  src_call: NOCALL    # Replace with ground-station callsign
  src_ssid: 0         # Replace with operational SSID
  dest_call: NOCALL   # Replace with spacecraft callsign
  dest_ssid: 0        # Replace with operational SSID

csp:
  priority: 2
  source: 0
  destination: 0      # Replace with operational CSP destination node
  dest_port: 0        # Replace with operational CSP destination port
  src_port: 0
  flags: 0
  csp_crc: true

command_defs: commands.yml

tx:
  frequency: "XXX.XX MHz"   # Replace with operational uplink frequency
  uplink_mode: ASM+Golay

ui:
  rx_title: RX DOWNLINK
  tx_title: TX UPLINK
  splash_subtitle: Mission Ground Station

# --------------------------------------------------------------------
# Imaging plugin configuration
# --------------------------------------------------------------------
# thumb_prefix controls how the GSS pairs thumbnail files with their
# full-size counterparts. When set (e.g. "tn_"), the GSS assumes
# every thumbnail filename is the full filename with this prefix
# prepended. When empty, pairing is disabled and every file appears
# as an unpaired single-file entry in the imaging UI.
imaging:
  thumb_prefix: "tn_"
