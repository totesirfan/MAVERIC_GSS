# Ground Station Operator Config (Example)
#
# Platform-level settings only. Mission-specific defaults (nodes, ptypes,
# callsigns, CSP routing, frequency, command schema, UI labels) are
# provided by the active mission package's mission.yml.
#
# Copy this file to gss.yml and adjust for your station.

tx:
  zmq_addr: tcp://127.0.0.1:52002
  delay_ms: 500
rx:
  zmq_addr: tcp://127.0.0.1:52001
general:
  log_dir: logs
  generated_commands_dir: generated_commands

# Station identity catalog — hostname → station ID.
# Every laptop runs the same gss.yml; each resolves its own station by
# hostname at startup. Unknown hosts fall back to the raw hostname label.
# UI config saves CANNOT change this catalog — edit the file directly.
stations:
  gs-laptop-0.local: GS-0
  gs-laptop-1.local: GS-1
  gs-laptop-2.local: GS-2
