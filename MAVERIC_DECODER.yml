# =============================================================================
#  MAVERIC Satellite Definition for gr-satellites
# =============================================================================
#
#  Used by:  gr_satellites -f maveric_decoder.yml
#
#  Defines available transmitter modes so gr-satellites knows how to
#  decode received signals. Each transmitter entry specifies the
#  modulation, baud rate, and framing format.
#
#  All frequencies are in Hz (scientific notation, e.g. 437.250e+6).
#
#  AX100 modes covered:
#    Mode 5 — ASM+Golay: NRZ, CCSDS randomized, MSB first (recommended)
#    Mode 6 — AX.25 HDLC: NRZI, G3RUH scrambled, LSB first
#
#  AX100 baud rates: 0.1–38.4 kbps (GFSK modulation)
#  gr-satellites runs all entries in parallel; only the matching
#  framing/baud produces valid decoded frames.

name: MAVERIC
norad: 0              # No NORAD catalog number assigned (pre-launch)

# Telemetry data definition — YAML anchor (&tlm) referenced by all transmitters.
# Currently a pass-through: no telemetry parser defined, raw frames are forwarded.
data:
  &tlm Telemetry:
    unknown: {}       # No structured telemetry decoder — frames passed through raw

# Available transmitter modes on the MAVERIC AX100 radio (437.250 MHz UHF)
# Covers 4k8–38k4 baud for both Mode 5 (ASM+Golay) and Mode 6 (AX.25)
transmitters:

  # -- Mode 5: ASM+Golay (recommended) ----------------------------------------
  4k8 FSK AX100 ASM+Golay downlink:
    frequency: 437.250e+6      # Hz
    modulation: FSK
    baudrate: 4800
    framing: AX100 ASM+Golay
    data:
      - *tlm
  9k6 FSK AX100 ASM+Golay downlink:
    frequency: 437.250e+6      # Hz
    modulation: FSK
    baudrate: 9600
    framing: AX100 ASM+Golay
    data:
      - *tlm
  19k2 FSK AX100 ASM+Golay downlink:
    frequency: 437.250e+6      # Hz
    modulation: FSK
    baudrate: 19200
    framing: AX100 ASM+Golay
    data:
      - *tlm
  38k4 FSK AX100 ASM+Golay downlink:
    frequency: 437.250e+6      # Hz
    modulation: FSK
    baudrate: 38400
    framing: AX100 ASM+Golay
    data:
      - *tlm

  # -- Mode 6: AX.25 HDLC -----------------------------------------------------
  4k8 FSK AX.25 G3RUH downlink:
    frequency: 437.250e+6      # Hz
    modulation: FSK
    baudrate: 4800
    framing: AX.25 G3RUH
    data:
      - *tlm
  9k6 FSK AX.25 G3RUH downlink:
    frequency: 437.250e+6      # Hz
    modulation: FSK
    baudrate: 9600
    framing: AX.25 G3RUH
    data:
      - *tlm
  19k2 FSK AX.25 G3RUH downlink:
    frequency: 437.250e+6      # Hz
    modulation: FSK
    baudrate: 19200
    framing: AX.25 G3RUH
    data:
      - *tlm
  38k4 FSK AX.25 G3RUH downlink:
    frequency: 437.250e+6      # Hz
    modulation: FSK
    baudrate: 38400
    framing: AX.25 G3RUH
    data:
      - *tlm
